<!DOCTYPE html>
<html>
<head>
    <title>GitLocal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* 🌟 全局鎖定外層捲動 */
        html, body { height: 100vh; overflow: hidden !important; margin: 0; }
        /* 增加 padding-top 與 padding-bottom 來控制上下留白，完美貼合視窗 */
        body.container { display: flex; flex-direction: column; max-width: 800px; padding-top: 4rem; padding-bottom: 4rem; }
        
        /* 上方標題與表單不被擠壓 */
        h1, .card { flex-shrink: 0; }
        
        /* 讓倉庫清單可以獨立向下捲動 */
        .list-group { flex: 1; overflow-y: auto; border: 1px solid #dee2e6; border-radius: 0.375rem; background-color: #fff; }
        .list-group-item { border-left: none; border-right: none; }
        .list-group-item:first-child { border-top: none; }

        /* 自訂美化捲軸 (與 repo.html 保持一致) */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: #c1c1c1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #a8a8a8; }
    </style>
</head>
<body class="container">
    <h1 class="mb-4">🗂️ 我的本地倉庫清單</h1>
	
	<div class="card mb-4 shadow-sm">
        <div class="card-body">
            <form action="/create_repo" method="POST" class="d-flex">
                <input type="text" name="repo_name" class="form-control me-2" placeholder="輸入新專案名稱 (例如: my_new_app)" required>
                <button type="submit" class="btn btn-success fw-bold text-nowrap">➕ 建立新倉庫</button>
            </form>
        </div>
    </div>
	
    <div class="list-group shadow-sm">
        {% for repo in repos %}
            <a href="/repo/{{ repo }}" class="list-group-item list-group-item-action fs-5 py-1 fw-semibold">
                📁 {{ repo }}
            </a>
        {% else %}
            <div class="p-4 text-center text-muted">目前沒有偵測到 Git 倉庫。請在上方建立。</div>
        {% endfor %}
    </div>
</body>
</html>
